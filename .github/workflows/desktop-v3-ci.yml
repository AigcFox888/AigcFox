name: desktop-v3-ci

on:
  push:
    branches:
      - main
      - dev
      - "feature/**"
    paths:
      - ".github/workflows/desktop-v3-ci.yml"
      - ".nvmrc"
      - "rust-toolchain.toml"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "apps/desktop-v3/**"
      - "scripts/**"
      - "docs/README.md"
      - "docs/248-autonomous-execution-baseline.md"
      - "docs/257-desktop-v3-replatform-proposal.md"
      - "docs/258-desktop-v3-technical-baseline.md"
      - "docs/259-desktop-v3-detailed-design.md"
      - "docs/260-desktop-v3-wave1-execution-baseline.md"
      - "docs/263-desktop-v3-wave1-acceptance-matrix.md"
      - "docs/264-desktop-v3-wave1-execution-runbook.md"
      - "docs/267-desktop-v3-github-actions-baseline.md"
      - "docs/269-desktop-v3-tauri-2-governance-baseline.md"
      - "docs/281-desktop-v3-post-reinstall-recovery-entry.md"
      - "apps/desktop-v3/README.md"
  pull_request:
    branches:
      - main
      - dev
    paths:
      - ".github/workflows/desktop-v3-ci.yml"
      - ".nvmrc"
      - "rust-toolchain.toml"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "apps/desktop-v3/**"
      - "scripts/**"
      - "docs/README.md"
      - "docs/248-autonomous-execution-baseline.md"
      - "docs/257-desktop-v3-replatform-proposal.md"
      - "docs/258-desktop-v3-technical-baseline.md"
      - "docs/259-desktop-v3-detailed-design.md"
      - "docs/260-desktop-v3-wave1-execution-baseline.md"
      - "docs/263-desktop-v3-wave1-acceptance-matrix.md"
      - "docs/264-desktop-v3-wave1-execution-runbook.md"
      - "docs/267-desktop-v3-github-actions-baseline.md"
      - "docs/269-desktop-v3-tauri-2-governance-baseline.md"
      - "docs/281-desktop-v3-post-reinstall-recovery-entry.md"
      - "apps/desktop-v3/README.md"

concurrency:
  group: desktop-v3-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  verify-linux:
    name: desktop-v3 verify (ubuntu)
    runs-on: ubuntu-24.04
    timeout-minutes: 75
    env:
      AIGCFOX_DESKTOP_V3_WAVE1_PROFILE: ci
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - name: Enable pnpm via corepack
        run: |
          corepack enable
          corepack prepare pnpm@10.32.1 --activate

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.94.1

      - name: Restore Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            apps/desktop-v3/src-tauri -> target

      - name: Install Linux host dependencies
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
            pkg-config \
            build-essential \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Run desktop-v3 Wave 1 fast tests
        run: pnpm test:desktop-v3-wave1-readiness

      - name: Run desktop-v3 Wave 1 verification
        run: pnpm qa:desktop-v3-wave1-readiness

      - name: Upload Wave 1 verification artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: desktop-v3-wave1-verification-${{ github.sha }}
          path: |
            output/verification/desktop-v3-wave1-readiness-*/**
            output/verification/latest/desktop-v3-wave1-readiness-summary.json
          if-no-files-found: warn
