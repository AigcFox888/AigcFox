name: desktop-v3-delivery-updater-docs

on:
  push:
    branches:
      - main
      - dev
      - "feature/**"
    paths:
      - ".github/workflows/desktop-v3-delivery-updater-docs.yml"
      - ".nvmrc"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "scripts/**"
      - "AGENTS.md"
      - "docs/README.md"
      - "docs/248-autonomous-execution-baseline.md"
      - "docs/267-desktop-v3-github-actions-baseline.md"
      - "docs/269-desktop-v3-tauri-2-governance-baseline.md"
      - "docs/274-desktop-v3-delivery-updater-proposal.md"
      - "docs/275-desktop-v3-delivery-updater-technical-baseline.md"
      - "docs/276-desktop-v3-delivery-updater-detailed-design.md"
      - "docs/277-desktop-v3-delivery-updater-execution-baseline.md"
      - "docs/278-desktop-v3-delivery-updater-acceptance-matrix.md"
      - "docs/279-desktop-v3-delivery-updater-execution-runbook.md"
      - "docs/280-desktop-v3-delivery-updater-closeout.md"
      - "docs/281-desktop-v3-post-reinstall-recovery-entry.md"
  pull_request:
    branches:
      - main
      - dev
    paths:
      - ".github/workflows/desktop-v3-delivery-updater-docs.yml"
      - ".nvmrc"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "scripts/**"
      - "AGENTS.md"
      - "docs/README.md"
      - "docs/248-autonomous-execution-baseline.md"
      - "docs/267-desktop-v3-github-actions-baseline.md"
      - "docs/269-desktop-v3-tauri-2-governance-baseline.md"
      - "docs/274-desktop-v3-delivery-updater-proposal.md"
      - "docs/275-desktop-v3-delivery-updater-technical-baseline.md"
      - "docs/276-desktop-v3-delivery-updater-detailed-design.md"
      - "docs/277-desktop-v3-delivery-updater-execution-baseline.md"
      - "docs/278-desktop-v3-delivery-updater-acceptance-matrix.md"
      - "docs/279-desktop-v3-delivery-updater-execution-runbook.md"
      - "docs/280-desktop-v3-delivery-updater-closeout.md"
      - "docs/281-desktop-v3-post-reinstall-recovery-entry.md"
  workflow_dispatch:

concurrency:
  group: desktop-v3-delivery-updater-docs-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  verify-delivery-updater-docs:
    name: desktop-v3 delivery/updater docs (ubuntu)
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - name: Enable pnpm via corepack
        run: |
          corepack enable
          corepack prepare pnpm@10.32.1 --activate

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Run delivery/updater docs fast tests
        run: pnpm test:desktop-v3-delivery-updater-docs

      - name: Run delivery/updater docs verification
        run: pnpm qa:desktop-v3-delivery-updater-docs

      - name: Run GitHub Actions lint
        run: pnpm qa:github-actions-lint

      - name: Run governance command docs verification
        run: pnpm qa:governance-command-docs

      - name: Upload delivery/updater docs artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: desktop-v3-delivery-updater-docs-${{ github.sha }}
          path: |
            output/verification/desktop-v3-delivery-updater-docs-*/**
            output/verification/latest/desktop-v3-delivery-updater-docs-summary.json
          if-no-files-found: warn
