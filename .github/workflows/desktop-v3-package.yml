name: desktop-v3-package

on:
  push:
    branches:
      - main
      - dev
      - "feature/**"
    paths:
      - ".github/workflows/desktop-v3-package.yml"
      - ".nvmrc"
      - "rust-toolchain.toml"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "apps/desktop-v3/**"
      - "scripts/**"
      - "docs/258-desktop-v3-technical-baseline.md"
      - "docs/267-desktop-v3-github-actions-baseline.md"
      - "docs/269-desktop-v3-tauri-2-governance-baseline.md"
  workflow_dispatch:

concurrency:
  group: desktop-v3-package-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  package:
    name: package (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: windows
            build_command: pnpm --filter @aigcfox/desktop-v3 tauri build --ci --no-sign --bundles msi
          - os: macos-latest
            label: macos
            build_command: pnpm --filter @aigcfox/desktop-v3 tauri build --ci --no-sign
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - name: Enable pnpm via corepack
        run: |
          corepack enable
          corepack prepare pnpm@10.32.1 --activate

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.94.1

      - name: Restore Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            apps/desktop-v3/src-tauri -> target

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Install WiX Toolset (windows)
        if: matrix.label == 'windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          function Invoke-WithRetry {
            param(
              [Parameter(Mandatory = $true)]
              [scriptblock]$Script,
              [Parameter(Mandatory = $true)]
              [string]$Label,
              [int]$MaxAttempts = 3
            )

            for ($attempt = 1; $attempt -le $MaxAttempts; $attempt++) {
              try {
                & $Script
                return
              } catch {
                if ($attempt -eq $MaxAttempts) {
                  throw
                }

                Write-Warning "$Label failed on attempt $attempt/$MaxAttempts. Retrying in 15 seconds..."
                Start-Sleep -Seconds 15
              }
            }
          }

          $wixBin = Get-Command candle.exe -ErrorAction SilentlyContinue | Select-Object -ExpandProperty Source -ErrorAction SilentlyContinue

          if (-not $wixBin) {
            Invoke-WithRetry -Label 'Install WiX Toolset 3.14.1 via Chocolatey' -Script {
              choco upgrade wixtoolset --version=3.14.1 -y --no-progress
            }

            $candidateBins = @(
              (Join-Path ${env:ProgramFiles(x86)} 'WiX Toolset v3.14\bin'),
              (Join-Path ${env:ProgramFiles(x86)} 'WiX Toolset v3.11\bin')
            )

            $wixBin = $candidateBins
              | Where-Object { Test-Path (Join-Path $_ 'candle.exe') }
              | Select-Object -First 1

            if (-not $wixBin) {
              throw 'WiX Toolset installation completed, but candle.exe was not found in the expected install paths.'
            }
          } else {
            $wixBin = Split-Path -Parent $wixBin
          }

          $wixRoot = Split-Path -Parent $wixBin
          $wixBin | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          "WIX=$wixRoot" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

          $tauriWixCache = Join-Path $env:LOCALAPPDATA 'tauri\WixTools314'
          $requiredWixFiles = @(
            'candle.exe',
            'candle.exe.config',
            'darice.cub',
            'light.exe',
            'light.exe.config',
            'wconsole.dll',
            'winterop.dll',
            'wix.dll',
            'WixUIExtension.dll',
            'WixUtilExtension.dll'
          )

          New-Item -ItemType Directory -Force -Path $tauriWixCache | Out-Null

          foreach ($fileName in $requiredWixFiles) {
            $sourcePath = Join-Path $wixBin $fileName

            if (-not (Test-Path $sourcePath)) {
              throw "Required WiX file was not found in the installed toolset: $sourcePath"
            }

            Copy-Item -LiteralPath $sourcePath -Destination (Join-Path $tauriWixCache $fileName) -Force
          }

      - name: Build desktop-v3 package
        run: ${{ matrix.build_command }}

      - name: Generate first-install package manifest
        id: package_manifest
        shell: pwsh
        run: |
          $artifactDir = "apps/desktop-v3/src-tauri/target/release/package-manifest/${{ matrix.label }}"
          $artifactPathsFile = Join-Path $artifactDir "artifact-paths.txt"

          node ./scripts/generate-desktop-v3-package-manifest.mjs --platform=${{ matrix.label }} --bundle-dir=apps/desktop-v3/src-tauri/target/release/bundle --output-dir=$artifactDir --artifact-paths-file=$artifactPathsFile

          $artifactPaths = Get-Content -LiteralPath $artifactPathsFile
          "paths<<EOF" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          $artifactPaths | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "EOF" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Upload package bundle
        uses: actions/upload-artifact@v6
        with:
          # These artifacts are first-install package outputs for maintainer retrieval only.
          # Maintainers must download them from GitHub Actions, then redistribute them
          # through Qiniu Kodo or a self-hosted HTTPS origin that users in China can reach.
          # Each artifact is restricted to first-install packages plus release-manifest.json
          # and SHA256SUMS.txt so maintainer upload targets stay enumerable and verifiable.
          # Later in-app updates must not point users back to GitHub artifacts or Releases.
          name: desktop-v3-${{ matrix.label }}-bundle-${{ github.sha }}
          path: ${{ steps.package_manifest.outputs.paths }}
          if-no-files-found: error
